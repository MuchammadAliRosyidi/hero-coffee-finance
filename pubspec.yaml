name: hero_coffee_finance
description: Aplikasi manajemen keuangan mobile Hero Coffee Indonesia dengan prediksi pengeluaran bulanan.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  path: ^1.9.0
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  pdf: ^3.11.1
  file_picker: ^8.0.7
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true



